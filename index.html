<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Mental Math - Training</title>
    <style>
        body { font-family: monospace; background-color: #0a0a0a; color: #d4d4d4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
        .view-container { display: flex; flex-direction: column; gap: 15px; background: #111; padding: 30px; border: 1px solid #333; width: 450px; max-width: 90vw; }
        .btn { padding: 12px; background: #222; color: #fff; border: 1px solid #555; font-weight: bold; cursor: pointer; font-family: monospace; text-align: center; transition: 0.2s; }
        .btn:hover { background: #ddd; color: #000; }
        .btn-back { background: transparent; border: none; text-align: left; padding: 0; margin-bottom: 20px; color: #888; }
        .btn-back:hover { background: transparent; color: #fff; text-decoration: underline; }
        .config-row { display: flex; justify-content: space-between; align-items: center; font-size: 1rem; margin-bottom: 5px; }
        .config-row input, .config-row select { background: #222; color: #fff; border: 1px solid #555; padding: 5px; font-family: monospace; }
        .config-row input { width: 120px; text-align: center; }
        .math-grid { display: grid; grid-template-columns: 1fr auto; row-gap: 10px; font-size: 3rem; }
        #multiplicand { text-align: right; }
        #multiplier { text-align: left; white-space: pre; color: #777; }
        #answer-input { grid-column: 1 / 2; font-family: monospace; font-size: 3rem; width: 300px; text-align: right; background: transparent; color: #fff; border: none; border-top: 2px solid #555; padding-top: 10px; outline: none; }
        .error-flash { color: #ff4444 !important; border-top: 2px solid #ff4444 !important; }
        
        .debug-panel { display: flex; gap: 10px; margin-top: 5px; }
        .btn-debug { flex: 1; padding: 8px; font-size: 0.8rem; border: 1px solid #444; color: #bbb; cursor: pointer; font-family: monospace; }
        #btn-reset-weights { background: #3a1a1a; }
        #btn-reset-weights:hover { background: #5a2a2a; color: #fff; }
        #btn-multiplier-stats { background: #1a2a3a; }
        #btn-multiplier-stats:hover { background: #2a4a6a; color: #fff; }
        #stats-output { background: #0a0a0a; border: 1px dashed #444; padding: 10px; font-size: 0.85rem; margin-top: 10px; white-space: pre-line; color: #aaa; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="view-practice-setup" class="view-container">
        <h2 style="margin-top:0; text-align: center;">Setup Session</h2>
        
        <div class="config-row">
            <label>Multiplicand:</label>
            <input type="text" id="config-digits" value="2" placeholder="es. 2, 2-4">
        </div>
        
        <div class="config-row">
            <label>Multiplier:</label>
            <div style="display: flex; gap: 5px;">
                <select id="config-mult-type">
                    <option value="literal">Exact</option>
                    <option value="digits">Digits</option>
                </select>
                <input type="text" id="config-mult" value="11" style="width: 130px;" placeholder="es. 8, 11-13, 15">
            </div>
        </div>
        
        <div class="config-row" style="margin-top: 10px;">
            <label>Time:</label>
            <div style="display: flex; gap: 5px;">
                <select id="config-time-type">
                    <option value="s">Seconds</option>
                    <option value="m">Minutes</option>
                </select>
                <input type="number" id="config-time" value="60" style="width: 80px;">
            </div>
        </div>
        
        <button class="btn" id="btn-start-session" style="margin-top: 15px;">Start Session</button>

        <div class="debug-panel">
            <button class="btn-debug" id="btn-reset-weights">Reset Weights</button>
            <button class="btn-debug" id="btn-multiplier-stats">Multiplier Statistics</button>
        </div>
        <div id="stats-output" class="hidden"></div>
    </div>

    <div id="view-game" class="hidden" style="display: flex; flex-direction: column; align-items: flex-start;">
        <button class="btn btn-back" id="btn-exit-game" style="position: absolute; top: 20px; left: 20px;">&lt; Abbandona Sessione</button>
        <div id="game-hud" style="width: 300px; display: flex; justify-content: space-between; font-size: 1.2rem; margin-bottom: 20px; color: #888; border-bottom: 1px solid #333; padding-bottom: 10px;">
            <div>Time: <span id="hud-time">60</span>s</div>
            <div>Score: <span id="hud-score">0</span></div>
        </div>
        <div class="math-grid">
            <div id="multiplicand">--</div>
            <div id="multiplier"> * --</div>
            <input type="text" id="answer-input" autocomplete="off">
        </div>
    </div>
    
    <script type="module" src="app.js"></script>
</body>
</html>
